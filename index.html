<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4a90e2',
                        danger: '#ff4d4f',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

    <!-- 认证区域：登录/注册/忘记密码 -->
    <section id="auth-section" class="min-h-screen flex items-center justify-center relative overflow-hidden">
        <!-- 背景图 -->
        <div class="absolute inset-0 z-0">
            <img src="https://picsum.photos/1920/1080?random=1" class="w-full h-full object-cover opacity-30 dark:opacity-20">
            <div class="absolute inset-0 bg-gradient-to-br from-blue-100 to-cyan-100 dark:from-gray-800 dark:to-gray-900"></div>
        </div>

        <div class="relative z-10 bg-white/90 dark:bg-gray-800/90 backdrop-blur-sm p-8 rounded-2xl shadow-2xl w-96">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6 text-gray-800 dark:text-white">网站测试</h2>

            <!-- 登录表单 -->
            <div id="login-form" class="space-y-4">
                <!-- 登录模式切换 -->
                <div class="flex mb-2">
                    <button id="pwd-login-btn" onclick="toggleLoginMode('pwd')" class="flex-1 py-2 bg-primary text-white rounded-l-lg text-sm font-medium">密码登录</button>
                    <button id="code-login-btn" onclick="toggleLoginMode('code')" class="flex-1 py-2 bg-gray-200 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-r-lg text-sm font-medium">验证码登录</button>
                </div>

                <!-- 密码登录区域 -->
                <div id="pwd-login-section">
                    <div>
                        <input type="text" id="login-id" placeholder="邮箱或用户名" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        <span class="error-msg text-danger text-xs mt-1" id="login-err"></span>
                    </div>
                    <div class="mt-3">
                        <input type="password" id="login-pwd" placeholder="密码" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    </div>
                </div>

                <!-- 验证码登录区域 -->
                <div id="code-login-section" class="hidden">
                    <div>
                        <input type="text" id="code-login-email" placeholder="邮箱" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        <span class="error-msg text-danger text-xs mt-1" id="code-login-email-err"></span>
                        <button onclick="sendLoginCode()" id="send-login-code-btn" class="w-full py-2 mt-2 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors text-sm font-medium">发送验证码</button>
                    </div>
                    <div class="mt-3">
                        <input type="text" id="code-login-code" placeholder="6位验证码" maxlength="6" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        <span class="error-msg text-danger text-xs mt-1" id="code-login-code-err"></span>
                    </div>
                </div>

                <!-- 图形验证码（仅密码登录显示） -->
                <div id="login-captcha-section" class="flex gap-2">
                    <input type="text" id="login-captcha" placeholder="验证码" maxlength="4" class="flex-1 px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <canvas id="login-captcha-canvas" width="80" height="40" class="cursor-pointer rounded-lg border border-gray-300 dark:border-gray-600" onclick="refreshCaptcha('login')"></canvas>
                </div>
                <span class="error-msg text-danger text-xs" id="login-captcha-err"></span>

                <button onclick="handleLogin()" id="login-btn" class="w-full py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">登录</button>
                <div class="text-center">
                    <span class="text-gray-500 dark:text-gray-400 text-sm">没有账号？</span>
                    <span onclick="toggleAuth(true)" class="text-primary cursor-pointer hover:underline text-sm">注册新账号</span>
                </div>
                <div class="text-center">
                    <span onclick="showForgotPassword()" class="text-gray-500 dark:text-gray-400 text-sm cursor-pointer hover:text-primary hover:underline">忘记密码？</span>
                </div>
            </div>

            <!-- 注册表单 -->
            <div id="register-form" class="hidden space-y-4">
                <div>
                    <input type="text" id="reg-user" placeholder="用户名" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="err-user"></span>
                </div>
                <div>
                    <input type="text" id="reg-email" placeholder="邮箱" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="err-email"></span>
                </div>
                <div>
                    <input type="password" id="reg-pwd1" placeholder="设置密码 (至少8位)" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="err-pwd1"></span>
                </div>
                <div>
                    <input type="password" id="reg-pwd2" placeholder="确认密码" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="err-pwd2"></span>
                </div>
                <!-- 验证码 -->
                <div class="flex gap-2">
                    <input type="text" id="reg-captcha" placeholder="验证码" maxlength="4" class="flex-1 px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <canvas id="reg-captcha-canvas" width="80" height="40" class="cursor-pointer rounded-lg border border-gray-300 dark:border-gray-600" onclick="refreshCaptcha('reg')"></canvas>
                </div>
                <span class="error-msg text-danger text-xs" id="reg-captcha-err"></span>
                <button onclick="handleRegister()" class="w-full py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">立即注册</button>
                <div class="text-center">
                    <span class="text-gray-500 dark:text-gray-400 text-sm">已有账号？</span>
                    <span onclick="toggleAuth(false)" class="text-primary cursor-pointer hover:underline text-sm">返回登录</span>
                </div>
            </div>

            <!-- 忘记密码表单 -->
            <div id="forgot-form" class="hidden space-y-4">
                <p class="text-sm text-gray-600 dark:text-gray-300 mb-3">输入您的注册邮箱，我们会发送验证码到您的邮箱。</p>
                <div id="forgot-email-section">
                    <input type="text" id="forgot-email" placeholder="邮箱" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="forgot-email-err"></span>
                    <button onclick="sendResetCode()" id="send-code-btn" class="w-full py-3 mt-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">发送验证码</button>
                </div>
                <div id="forgot-code-section">
                    <p class="text-sm text-gray-600 dark:text-gray-300 mb-3">请查收邮件，输入验证码并设置新密码。</p>
                    <input type="text" id="forgot-code" placeholder="验证码" maxlength="6" class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="forgot-code-err"></span>
                    <input type="password" id="forgot-new-pwd1" placeholder="新密码 (至少8位)" class="w-full px-4 py-3 mt-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="forgot-pwd1-err"></span>
                    <input type="password" id="forgot-new-pwd2" placeholder="确认新密码" class="w-full px-4 py-3 mt-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-800 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                    <span class="error-msg text-danger text-xs mt-1" id="forgot-pwd2-err"></span>
                    <button onclick="resetPassword()" class="w-full py-3 mt-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">重置密码</button>
                </div>
                <div class="text-center">
                    <span onclick="showLogin()" class="text-primary cursor-pointer hover:underline text-sm">返回登录</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 主系统 -->
    <main id="main-system" class="hidden flex min-h-screen">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-56 bg-gray-900 text-white flex flex-col">
            <div class="p-4 text-center text-xl font-bold border-b border-gray-700">网站测试</div>
            <nav class="flex-1 py-4">
                <div class="nav-item px-6 py-3 cursor-pointer hover:bg-blue-600 transition-colors" onclick="switchTab('home')">主页面</div>
                <div class="nav-item px-6 py-3 cursor-pointer hover:bg-blue-600 transition-colors" onclick="switchTab('discover')">发现</div>
                <div class="nav-item px-6 py-3 cursor-pointer hover:bg-blue-600 transition-colors" onclick="switchTab('profile')">我的</div>
                <div class="nav-item px-6 py-3 cursor-pointer hover:bg-blue-600 transition-colors" onclick="switchTab('sorting')">数字排序</div>
                <div id="admin-menu" class="nav-item admin-only hidden px-6 py-3 cursor-pointer hover:bg-blue-600 transition-colors" onclick="switchTab('admin')">用户数据</div>
            </nav>
            <div class="p-4 border-t border-gray-700">
                <button id="theme-toggle" onclick="toggleTheme()" class="w-full py-2 px-4 bg-gray-700 hover:bg-gray-600 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <span id="theme-icon">☀️</span>
                    <span id="theme-text">切换主题</span>
                </button>
            </div>
        </aside>

        <!-- 内容区 -->
        <section id="content" class="flex-1 p-8 bg-white dark:bg-gray-800 overflow-y-auto">
            <!-- 主页 -->
            <div id="page-home" class="page">
                <h1 class="text-3xl font-bold mb-4 text-gray-800 dark:text-white">主页</h1>
                <p class="text-gray-600 dark:text-gray-300">欢迎来到网站测试系统。</p>
            </div>
            <!-- 发现页 -->
            <div id="page-discover" class="page hidden">
                <h1 class="text-3xl font-bold mb-4 text-gray-800 dark:text-white">发现</h1>
                <p class="text-gray-600 dark:text-gray-300">内容建设中...</p>
            </div>
            <!-- 我的页面 -->
            <div id="page-profile" class="page hidden">
                <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-xl max-w-md">
                    <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">个人信息</h2>
                    <p class="text-gray-700 dark:text-gray-200 mb-2"><strong>用户名：</strong><span id="display-username"></span></p>
                    <p class="text-gray-700 dark:text-gray-200 mb-4"><strong>邮箱：</strong><span id="display-email"></span></p>
                    <hr class="border-gray-300 dark:border-gray-600 mb-4">
                    <button onclick="handleLogout()" class="w-full py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors mb-2">退出登录</button>
                    <button onclick="handleDeleteAccount()" class="w-full py-2 bg-danger text-white rounded-lg hover:bg-red-600 transition-colors">注销账号</button>
                </div>
            </div>
            <!-- 管理面板 -->
            <div id="page-admin" class="page hidden">
                <h1 class="text-3xl font-bold mb-4 text-gray-800 dark:text-white">管理面板</h1>
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100 dark:bg-gray-700">
                            <th class="text-left p-3 border-b border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200">用户名</th>
                            <th class="text-left p-3 border-b border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-200">邮箱</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="text-gray-700 dark:text-gray-300"></tbody>
                </table>
            </div>
            <!-- 数字排序页面 -->
            <div id="page-sorting" class="page hidden">
                <h1 class="text-3xl font-bold mb-6 text-gray-800 dark:text-white">数字排序</h1>

                <!-- 文件上传区 -->
                <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-xl mb-6">
                    <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">上传文件</h2>
                    <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg p-8 text-center hover:border-blue-500 transition-colors"
                         id="drop-zone"
                         ondragover="handleDragOver(event)"
                         ondragleave="handleDragLeave(event)"
                         ondrop="handleDrop(event)">
                        <input type="file" id="file-input" class="hidden" accept=".txt,.csv,.xlsx,.xls,.doc,.docx">
                        <p class="text-gray-500 dark:text-gray-400 mb-2">拖拽文件到此处，或</p>
                        <button type="button" onclick="document.getElementById('file-input').click()"
                                class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors">
                            选择文件
                        </button>
                        <p class="text-xs text-gray-400 mt-2">支持格式: .txt, .csv, .xlsx, .xls, .doc, .docx</p>
                    </div>
                    <p id="file-name" class="mt-2 text-sm text-gray-600 dark:text-gray-300"></p>
                </div>

                <!-- 排序选项 -->
                <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-xl mb-6">
                    <h2 class="text-xl font-bold mb-4 text-gray-800 dark:text-white">排序设置</h2>
                    <div class="flex gap-4 items-center">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="sort-order" value="asc" checked class="w-4 h-4 text-blue-500">
                            <span class="text-gray-700 dark:text-gray-200">升序 (从小到大)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="radio" name="sort-order" value="desc" class="w-4 h-4 text-blue-500">
                            <span class="text-gray-700 dark:text-gray-200">降序 (从大到小)</span>
                        </label>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="flex gap-4 mb-6">
                    <button type="button" onclick="handleSort()" id="sort-btn" disabled
                            class="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                        开始排序
                    </button>
                    <button type="button" onclick="handleClear()"
                            class="px-6 py-3 bg-gray-500 text-white rounded-lg hover:bg-gray-600 transition-colors">
                        清空
                    </button>
                </div>

                <!-- 进度显示 -->
                <div id="sort-progress" class="hidden mb-6">
                    <div class="flex items-center gap-3">
                        <div class="animate-spin w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full"></div>
                        <span class="text-gray-600 dark:text-gray-300">处理中...</span>
                    </div>
                </div>

                <!-- 原始数据预览 -->
                <div id="original-preview" class="hidden bg-gray-50 dark:bg-gray-700 p-6 rounded-xl mb-6">
                    <h3 class="font-bold mb-3 text-gray-800 dark:text-white">原始数据</h3>
                    <p id="original-count" class="text-sm text-gray-500 mb-2"></p>
                    <div id="original-numbers" class="max-h-40 overflow-y-auto text-sm text-gray-700 dark:text-gray-300 font-mono whitespace-pre-wrap"></div>
                </div>

                <!-- 排序结果 -->
                <div id="sort-result" class="hidden bg-gray-50 dark:bg-gray-700 p-6 rounded-xl">
                    <h3 class="font-bold mb-3 text-gray-800 dark:text-white">排序结果</h3>
                    <p id="sorted-count" class="text-sm text-gray-500 mb-2"></p>
                    <div id="sorted-numbers" class="max-h-60 overflow-y-auto text-sm text-gray-700 dark:text-gray-300 font-mono whitespace-pre-wrap mb-4"></div>
                    <button type="button" onclick="handleDownload()"
                            class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                        下载结果文件
                    </button>
                </div>

                <!-- 错误提示 -->
                <div id="error-message" class="hidden bg-red-50 dark:bg-red-900/20 p-4 rounded-lg text-red-600 dark:text-red-400"></div>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
    <script>
        // 初始化验证码
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            refreshCaptcha('login');
            refreshCaptcha('reg');
        });
    </script>
</body>
</html>
