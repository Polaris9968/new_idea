<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站测试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="auth-section">
        <div class="auth-container">
            <h2 id="auth-title">网站测试</h2>
            
            <div id="login-form">
                <div class="input-group">
                    <input type="text" id="login-id" placeholder="邮箱或用户名">
                    <span class="error-msg" id="login-err"></span>
                </div>
                <div class="input-group">
                    <input type="password" id="login-pwd" placeholder="密码">
                </div>
                <button onclick="handleLogin()">登录</button>
                <div class="switch-link">没有账号？<span onclick="toggleAuth(true)">注册新账号</span></div>
            </div>

            <div id="register-form" class="hidden">
                <div class="input-group">
                    <input type="text" id="reg-user" placeholder="用户名">
                    <span class="error-msg" id="err-user"></span>
                </div>
                <div class="input-group">
                    <input type="text" id="reg-email" placeholder="邮箱">
                    <span class="error-msg" id="err-email"></span>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pwd1" placeholder="设置密码 (至少8位)">
                    <span class="error-msg" id="err-pwd1"></span>
                </div>
                <div class="input-group">
                    <input type="password" id="reg-pwd2" placeholder="确认密码">
                    <span class="error-msg" id="err-pwd2"></span>
                </div>
                <button onclick="handleRegister()">立即注册</button>
                <div class="switch-link">已有账号？<span onclick="toggleAuth(false)">返回登录</span></div>
            </div>
        </div>
    </section>

    <main id="main-system" class="hidden">
        <aside id="sidebar">
            <div class="nav-item active" onclick="switchTab('home')">主页面</div>
            <div class="nav-item" onclick="switchTab('discover')">发现</div>
            <div class="nav-item" onclick="switchTab('profile')">我的</div>
            <div id="admin-menu" class="nav-item admin-only hidden" onclick="switchTab('admin')">用户数据</div>
        </aside>

        <section id="content">
            <div id="page-home" class="page">
                <h1>主页</h1>
                <p>欢迎来到网站测试系统。</p>
            </div>
            <div id="page-discover" class="page hidden">
                <h1>发现</h1>
                <p>内容建设中...</p>
            </div>
            <div id="page-profile" class="page hidden">
                <div class="info-card">
                    <h2>个人信息</h2>
                    <p><strong>用户名：</strong><span id="display-username"></span></p>
                    <p><strong>邮箱：</strong><span id="display-email"></span></p>
                    <hr>
                    <button class="btn-logout" onclick="handleLogout()">退出登录</button>
                </div>
            </div>
            <div id="page-admin" class="page hidden">
                <h1>管理面板</h1>
                <table>
                    <thead>
                        <tr><th>用户名</th><th>邮箱</th></tr>
                    </thead>
                    <tbody id="user-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
